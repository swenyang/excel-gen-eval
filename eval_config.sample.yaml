# Excel Gen Eval — 配置文件
# 复制此文件为 eval_config.yaml 并填入你的设置

llm:
  provider: anthropic                        # LLM 提供商 (anthropic, openai 等)
  model: claude-sonnet-4-6                   # 模型名称
  api_key: ""                                # API Key（直接填写）
  # api_key: ANTHROPIC_API_KEY           # 或者通过环境变量设置（二选一）
  temperature: 0.0                           # 0.0 = 最大可复现性
  max_retries: 3                             # API 错误最大重试次数
  timeout: 120                               # 单次 LLM 调用超时（秒）
  max_tokens: 16384                          # 最大输出 token 数

evaluation:
  max_concurrent_calls: 8                    # 最大并行 LLM 调用数（8 = 每维度一个）
  screenshot_enabled: true                   # 需要 LibreOffice，设为 false 可跳过截图
  max_input_tokens_per_dimension: 100000     # 每维度 prompt 的 token 预算

output:
  formats:                                   # 报告格式
    - json
    - html
    - excel
  output_dir: ./results                      # 报告输出目录
